name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Phase 1: Test gate ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check docs release metadata
        run: npm run docs:check

      - name: Build
        run: npx electron-vite build

      - name: Unit tests
        run: npx vitest run

  # ── Phase 2: Multi-platform build ──────────────────────────────
  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Let all platforms try, so we see ALL failures
      matrix:
        include:
          - os: windows-latest
            platform: win
            builder_args: --win --x64
            expected_files: "*.exe"
          - os: macos-latest
            platform: mac
            builder_args: --mac
            expected_files: "*.dmg"
          - os: ubuntu-latest
            platform: linux
            builder_args: --linux
            expected_files: "*.AppImage"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Check docs release metadata
        run: npm run docs:check

      - name: Build
        run: npx electron-vite build

      - name: Package (no publish)
        if: matrix.platform != 'mac'
        run: npx electron-builder ${{ matrix.builder_args }} --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package with signing (macOS)
        if: matrix.platform == 'mac'
        run: npx electron-builder ${{ matrix.builder_args }} --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Validate build output
        shell: bash
        run: |
          echo "Checking for expected files: ${{ matrix.expected_files }}"
          FILES=$(find release/ -name "${{ matrix.expected_files }}" 2>/dev/null | head -5)
          if [ -z "$FILES" ]; then
            echo "::error::No matching files found for pattern: ${{ matrix.expected_files }}"
            ls -la release/ 2>/dev/null || echo "release/ directory does not exist"
            exit 1
          fi
          echo "Found:"
          echo "$FILES"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release/
          retention-days: 7

  # ── Phase 3: Publish (only if ALL platforms succeeded) ─────────
  publish:
    needs: build
    # This job ONLY runs if every matrix build succeeded
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false

      - name: Validate all platforms present
        run: |
          set -euo pipefail
          echo "=== Validating all platform artifacts ==="
          find artifacts/ -type f | sort

          MISSING=""
          find artifacts/release-win/ -name "*.exe" | grep -q . || MISSING="$MISSING Windows(.exe)"
          find artifacts/release-mac/ -name "*.dmg" | grep -q . || MISSING="$MISSING macOS(.dmg)"
          find artifacts/release-linux/ -name "*.AppImage" | grep -q . || MISSING="$MISSING Linux(.AppImage)"

          if [ -n "$MISSING" ]; then
            echo "::error::Missing platform artifacts:$MISSING"
            exit 1
          fi
          echo "All 3 platforms verified."

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
            FEATS=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^feat" 2>/dev/null || true)
            FIXES=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^fix" 2>/dev/null || true)
            OTHER=$(git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^refactor\|^build\|^test\|^docs\|^ci\|^chore\|^security" 2>/dev/null || true)

            if [ -n "$FEATS" ]; then
              echo "### Features" >> changelog.md
              echo "$FEATS" >> changelog.md
              echo "" >> changelog.md
            fi

            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes" >> changelog.md
              echo "$FIXES" >> changelog.md
              echo "" >> changelog.md
            fi

            if [ -n "$OTHER" ]; then
              echo "### Other Changes" >> changelog.md
              echo "$OTHER" >> changelog.md
              echo "" >> changelog.md
            fi

            # Fallback if no conventional commits matched
            if [ -z "$FEATS" ] && [ -z "$FIXES" ] && [ -z "$OTHER" ]; then
              echo "- Bug fixes and improvements" >> changelog.md
              echo "" >> changelog.md
            fi
          else
            echo "Initial release." >> changelog.md
          fi

      - name: Create release and upload all assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF#refs/tags/}

          # Clean up any leftover draft releases from failed previous runs
          DRAFT_IDS=$(gh api repos/${{ github.repository }}/releases \
            --jq "[.[] | select(.draft==true and .tag_name==\"${TAG}\")] | .[].id" 2>/dev/null || true)
          for DID in $DRAFT_IDS; do
            echo "Cleaning up stale draft $DID"
            gh api repos/${{ github.repository }}/releases/${DID} -X DELETE 2>/dev/null || true
          done

          # Delete existing published release for this tag (re-run scenario)
          gh release delete "${TAG}" --yes 2>/dev/null || true

          # Detect beta/alpha tags and mark as pre-release
          PRERELEASE_FLAG=""
          if [[ "${TAG}" == *"-beta"* || "${TAG}" == *"-alpha"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Create fresh release
          gh release create "${TAG}" ${PRERELEASE_FLAG} --title "${TAG#v}" --notes-file changelog.md

          # Upload all release assets (handle filenames with spaces)
          find artifacts/ -type f \( \
            -name "*.exe" -o -name "*.exe.blockmap" \
            -o -name "*.dmg" -o -name "*.dmg.blockmap" \
            -o -name "*.AppImage" -o -name "*.deb" \
            -o -name "latest*.yml" \
          \) -print0 | while IFS= read -r -d '' f; do
            echo "Uploading $(basename "$f")"
            gh release upload "${TAG}" "$f" --clobber
          done

      - name: Verify release integrity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF#refs/tags/}

          echo "=== Release integrity check ==="
          ASSETS=$(gh release view "${TAG}" --json assets --jq '.assets[].name')
          echo "$ASSETS"

          ERRORS=""
          echo "$ASSETS" | grep -q '\.exe$' || ERRORS="$ERRORS [MISSING: .exe]"
          echo "$ASSETS" | grep -q '\.dmg$' || ERRORS="$ERRORS [MISSING: .dmg]"
          echo "$ASSETS" | grep -q '\.AppImage$' || ERRORS="$ERRORS [MISSING: .AppImage]"
          echo "$ASSETS" | grep -q 'latest\.yml$' || ERRORS="$ERRORS [MISSING: latest.yml]"
          echo "$ASSETS" | grep -q 'latest-mac\.yml$' || ERRORS="$ERRORS [MISSING: latest-mac.yml]"
          echo "$ASSETS" | grep -q 'latest-linux\.yml$' || ERRORS="$ERRORS [MISSING: latest-linux.yml]"

          if [ -n "$ERRORS" ]; then
            echo "::error::Release integrity check failed:$ERRORS"
            exit 1
          fi

          ASSET_COUNT=$(echo "$ASSETS" | wc -l)
          echo "Release ${TAG} verified: ${ASSET_COUNT} assets, all platforms present."
