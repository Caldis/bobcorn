name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx electron-vite build

      - name: Package & upload (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win --x64 --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package & upload (macOS)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package & upload (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          # Generate changelog from commits
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
            # Categorize commits
            echo "### Features" >> changelog.md
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^feat" >> changelog.md || true
            echo "" >> changelog.md

            echo "### Bug Fixes" >> changelog.md
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^fix" >> changelog.md || true
            echo "" >> changelog.md

            echo "### Other Changes" >> changelog.md
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^refactor\|^build\|^test\|^docs\|^ci\|^chore\|^security" >> changelog.md || true
            echo "" >> changelog.md
          else
            echo "Initial release." >> changelog.md
          fi

          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "*Built by AI Agent teams using Claude Code.*" >> changelog.md

      - name: Publish release with changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          # electron-builder creates separate draft releases per platform
          # Collect all draft release IDs for this tag
          DRAFT_IDS=$(gh api repos/${{ github.repository }}/releases \
            --jq "[.[] | select(.draft==true and .tag_name==\"${TAG}\")] | .[].id" 2>/dev/null || true)

          # Create or find the published release
          RELEASE_URL=$(gh release view "${TAG}" --json url --jq .url 2>/dev/null || true)
          if [ -z "$RELEASE_URL" ]; then
            gh release create "${TAG}" --title "${TAG}" --notes-file changelog.md
          fi

          # Download all assets from drafts, upload to published release
          mkdir -p /tmp/release-assets
          for DRAFT_ID in $DRAFT_IDS; do
            echo "Processing draft $DRAFT_ID"
            ASSET_URLS=$(gh api repos/${{ github.repository }}/releases/${DRAFT_ID}/assets \
              --jq '.[].url' 2>/dev/null || true)
            for ASSET_URL in $ASSET_URLS; do
              NAME=$(gh api "$ASSET_URL" --jq '.name')
              echo "  Downloading $NAME"
              gh api "$ASSET_URL" -H "Accept: application/octet-stream" > "/tmp/release-assets/$NAME" 2>/dev/null || true
            done
            # Delete draft
            gh api repos/${{ github.repository }}/releases/${DRAFT_ID} -X DELETE 2>/dev/null || true
          done

          # Upload all assets to the published release
          for f in /tmp/release-assets/*; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename $f)"
            gh release upload "${TAG}" "$f" --clobber 2>/dev/null || true
          done

          # Update release body
          gh release edit "${TAG}" --notes-file changelog.md 2>/dev/null || true
          echo "Published ${TAG} with all platform assets"
