name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npx electron-vite build

      - name: Package & upload (Windows)
        if: runner.os == 'Windows'
        run: npx electron-builder --win --x64 --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package & upload (macOS)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package & upload (Linux)
        if: runner.os == 'Linux'
        run: npx electron-builder --linux --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}

          # Generate changelog from commits
          echo "## What's Changed" > changelog.md
          echo "" >> changelog.md

          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$CURRENT_TAG" ]; then
            # Categorize commits
            echo "### Features" >> changelog.md
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^feat" >> changelog.md || true
            echo "" >> changelog.md

            echo "### Bug Fixes" >> changelog.md
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^fix" >> changelog.md || true
            echo "" >> changelog.md

            echo "### Other Changes" >> changelog.md
            git log ${PREV_TAG}..${CURRENT_TAG} --pretty=format:"- %s" --grep="^refactor\|^build\|^test\|^docs\|^ci\|^chore\|^security" >> changelog.md || true
            echo "" >> changelog.md
          else
            echo "Initial release." >> changelog.md
          fi

          echo "" >> changelog.md
          echo "---" >> changelog.md
          echo "*Built by AI Agent teams using Claude Code.*" >> changelog.md

      - name: Publish release with changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=${GITHUB_REF#refs/tags/}
          echo "Publishing ${TAG}"

          # electron-builder creates a single draft release; all platforms upload to it
          DRAFT_IDS=$(gh api repos/${{ github.repository }}/releases \
            --jq "[.[] | select(.draft==true and .tag_name==\"${TAG}\")] | .[].id")
          echo "Found draft IDs: ${DRAFT_IDS:-none}"

          # Always create published release first (draft != published)
          if ! gh release view "${TAG}" --json isDraft --jq 'select(.isDraft==false)' >/dev/null 2>&1; then
            echo "Creating release ${TAG}"
            gh release create "${TAG}" --title "${TAG#v}" --notes-file changelog.md
          fi

          # Download all assets from drafts, then delete drafts
          mkdir -p /tmp/release-assets
          for DRAFT_ID in $DRAFT_IDS; do
            echo "Processing draft ${DRAFT_ID}"
            ASSETS_JSON=$(gh api "repos/${{ github.repository }}/releases/${DRAFT_ID}/assets")
            echo "$ASSETS_JSON" | jq -r '.[].url' | while read -r ASSET_URL; do
              NAME=$(echo "$ASSETS_JSON" | jq -r ".[] | select(.url==\"${ASSET_URL}\") | .name")
              echo "  Downloading ${NAME}"
              gh api "${ASSET_URL}" -H "Accept: application/octet-stream" > "/tmp/release-assets/${NAME}"
            done
            gh api "repos/${{ github.repository }}/releases/${DRAFT_ID}" -X DELETE
            echo "  Deleted draft ${DRAFT_ID}"
          done

          # Upload assets to published release
          for f in /tmp/release-assets/*; do
            [ -f "$f" ] || continue
            echo "Uploading $(basename "$f")"
            gh release upload "${TAG}" "$f" --clobber
          done

          # Update release body
          gh release edit "${TAG}" --notes-file changelog.md
          echo "Published ${TAG} with all platform assets"
