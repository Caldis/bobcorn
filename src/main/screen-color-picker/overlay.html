<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; cursor: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  #canvas-source {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    object-fit: cover;
  }
  #magnifier {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.9);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.4);
    display: none;
    z-index: 10;
  }
  #magnifier canvas {
    display: block;
    border-radius: 50%;
  }
  #color-label {
    position: fixed;
    pointer-events: none;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Cascadia Code', 'Consolas', 'SF Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    display: none;
    z-index: 11;
    white-space: nowrap;
  }
  #crosshair {
    position: absolute;
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>
  <canvas id="canvas-source"></canvas>
  <div id="magnifier"><canvas id="canvas-mag"></canvas></div>
  <div id="color-label"></div>

<script>
  const ZOOM = 10;
  const GRID_COUNT = 13; // odd number
  const MAG_SIZE = ZOOM * GRID_COUNT;

  const sourceCanvas = document.getElementById('canvas-source');
  const sourceCtx = sourceCanvas.getContext('2d');
  const magDiv = document.getElementById('magnifier');
  const magCanvas = document.getElementById('canvas-mag');
  const magCtx = magCanvas.getContext('2d');
  const colorLabel = document.getElementById('color-label');

  magCanvas.width = magCanvas.height = MAG_SIZE;
  magDiv.style.width = magDiv.style.height = MAG_SIZE + 'px';

  let currentColor = '';
  let imgLoaded = false;

  // Receive screenshot from main process
  window.colorPickerAPI.onScreenshotData((dataUrl, screenW, screenH) => {
    const img = new Image();
    img.onload = () => {
      sourceCanvas.width = img.width;
      sourceCanvas.height = img.height;
      sourceCtx.drawImage(img, 0, 0);
      imgLoaded = true;
    };
    img.src = dataUrl;
  });

  function getPixelColor(x, y) {
    const pixel = sourceCtx.getImageData(x, y, 1, 1).data;
    const r = pixel[0].toString(16).padStart(2, '0');
    const g = pixel[1].toString(16).padStart(2, '0');
    const b = pixel[2].toString(16).padStart(2, '0');
    return '#' + r + g + b;
  }

  function drawMagnifier(clientX, clientY) {
    if (!imgLoaded) return;

    // Map client coords to canvas pixel coords (handle DPR)
    const rect = sourceCanvas.getBoundingClientRect();
    const scaleX = sourceCanvas.width / rect.width;
    const scaleY = sourceCanvas.height / rect.height;
    const cx = Math.round(clientX * scaleX);
    const cy = Math.round(clientY * scaleY);

    // Half grid
    const half = Math.floor(GRID_COUNT / 2);

    // Extract pixel region
    const startX = cx - half;
    const startY = cy - half;
    const imageData = sourceCtx.getImageData(startX, startY, GRID_COUNT, GRID_COUNT);

    // Get center pixel color
    currentColor = getPixelColor(cx, cy);

    // Scale up to magnifier size
    magCtx.imageSmoothingEnabled = false;

    // Draw each pixel as a zoomed block
    const pixels = imageData.data;
    for (let py = 0; py < GRID_COUNT; py++) {
      for (let px = 0; px < GRID_COUNT; px++) {
        const i = (py * GRID_COUNT + px) * 4;
        magCtx.fillStyle = 'rgb(' + pixels[i] + ',' + pixels[i+1] + ',' + pixels[i+2] + ')';
        magCtx.fillRect(px * ZOOM, py * ZOOM, ZOOM, ZOOM);
      }
    }

    // Draw grid lines
    magCtx.strokeStyle = 'rgba(255,255,255,0.15)';
    magCtx.lineWidth = 0.5;
    for (let i = 0; i <= GRID_COUNT; i++) {
      magCtx.beginPath();
      magCtx.moveTo(i * ZOOM, 0);
      magCtx.lineTo(i * ZOOM, MAG_SIZE);
      magCtx.stroke();
      magCtx.beginPath();
      magCtx.moveTo(0, i * ZOOM);
      magCtx.lineTo(MAG_SIZE, i * ZOOM);
      magCtx.stroke();
    }

    // Highlight center pixel
    magCtx.strokeStyle = '#fff';
    magCtx.lineWidth = 2;
    magCtx.strokeRect(half * ZOOM, half * ZOOM, ZOOM, ZOOM);
    magCtx.strokeStyle = '#000';
    magCtx.lineWidth = 1;
    magCtx.strokeRect(half * ZOOM - 1, half * ZOOM - 1, ZOOM + 2, ZOOM + 2);

    // Position magnifier (offset from cursor)
    const offsetX = 20;
    const offsetY = 20;
    const totalW = MAG_SIZE + 6; // + border
    let magX = clientX + offsetX;
    let magY = clientY + offsetY;

    // Keep in viewport
    if (magX + totalW > window.innerWidth) magX = clientX - offsetX - totalW;
    if (magY + totalW > window.innerHeight) magY = clientY - offsetY - totalW;

    magDiv.style.transform = 'translate(' + magX + 'px,' + magY + 'px)';
    magDiv.style.display = 'block';

    // Color label below magnifier
    colorLabel.textContent = currentColor.toUpperCase();
    colorLabel.style.background = currentColor;
    // Determine text color based on luminance
    const r = parseInt(currentColor.slice(1,3), 16);
    const g = parseInt(currentColor.slice(3,5), 16);
    const b = parseInt(currentColor.slice(5,7), 16);
    const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    colorLabel.style.color = lum > 0.5 ? '#000' : '#fff';
    colorLabel.style.transform = 'translate(' + (magX + totalW / 2 - 35) + 'px,' + (magY + totalW + 8) + 'px)';
    colorLabel.style.display = 'block';
  }

  document.addEventListener('mousemove', (e) => {
    drawMagnifier(e.clientX, e.clientY);
  });

  document.addEventListener('click', (e) => {
    if (!imgLoaded) return;
    window.colorPickerAPI.sendColorPicked(currentColor);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      window.colorPickerAPI.sendColorPicked('');
    }
  });

  // Right-click also cancels
  document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    window.colorPickerAPI.sendColorPicked('');
  });
</script>
</body>
</html>
