<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; cursor: none; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  #canvas-source {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    object-fit: cover;
  }
  #magnifier {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.9);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.4);
    z-index: 10;
  }
  #magnifier canvas {
    display: block;
    border-radius: 50%;
  }
  #color-label {
    position: fixed;
    pointer-events: none;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Cascadia Code', 'Consolas', 'SF Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 11;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <canvas id="canvas-source"></canvas>
  <div id="magnifier"><canvas id="canvas-mag"></canvas></div>
  <div id="color-label"></div>

<script>
  // Fixed magnifier display size (CSS pixels)
  const MAG_DISPLAY_SIZE = 140;
  // Grid: how many source pixels to sample (variable via scroll)
  // Fewer pixels = higher magnification
  const GRID_MIN = 5;   // max zoom (5×5 pixels fill 140px = 28x magnification)
  const GRID_MAX = 141; // min zoom — 1:1 (141×141 pixels fill 140px ≈ no magnification)
  let gridCount = 13;   // default: 13×13 ≈ 10x

  const sourceCanvas = document.getElementById('canvas-source');
  const sourceCtx = sourceCanvas.getContext('2d');
  const magDiv = document.getElementById('magnifier');
  const magCanvas = document.getElementById('canvas-mag');
  const magCtx = magCanvas.getContext('2d');
  const colorLabel = document.getElementById('color-label');

  // Magnifier container is always fixed size
  magDiv.style.width = magDiv.style.height = MAG_DISPLAY_SIZE + 'px';
  // Canvas resolution matches display size; we draw gridCount pixels scaled up
  magCanvas.width = magCanvas.height = MAG_DISPLAY_SIZE;
  magCanvas.style.width = magCanvas.style.height = MAG_DISPLAY_SIZE + 'px';

  let currentColor = '';
  let imgLoaded = false;
  let lastClientX = 0, lastClientY = 0;

  // Receive screenshot from main process — async, magnifier shows before this
  window.colorPickerAPI.onScreenshotData((dataUrl) => {
    const img = new Image();
    img.onload = () => {
      sourceCanvas.width = img.width;
      sourceCanvas.height = img.height;
      sourceCtx.drawImage(img, 0, 0);
      imgLoaded = true;
      // Redraw magnifier at current mouse position now that image is ready
      drawMagnifier(lastClientX, lastClientY);
    };
    img.src = dataUrl;
  });

  function getPixelColor(x, y) {
    if (!imgLoaded) return '#000000';
    const px = Math.max(0, Math.min(sourceCanvas.width - 1, x));
    const py = Math.max(0, Math.min(sourceCanvas.height - 1, y));
    const pixel = sourceCtx.getImageData(px, py, 1, 1).data;
    return '#' + pixel[0].toString(16).padStart(2, '0')
              + pixel[1].toString(16).padStart(2, '0')
              + pixel[2].toString(16).padStart(2, '0');
  }

  function drawMagnifier(clientX, clientY) {
    const cellSize = MAG_DISPLAY_SIZE / gridCount;
    const half = Math.floor(gridCount / 2);

    // Position magnifier — always centered on cursor
    const totalW = MAG_DISPLAY_SIZE + 6;
    const magX = clientX - totalW / 2;
    const magY = clientY - totalW / 2;
    magDiv.style.transform = 'translate(' + magX + 'px,' + magY + 'px)';

    if (!imgLoaded) {
      magCtx.fillStyle = '#222';
      magCtx.fillRect(0, 0, MAG_DISPLAY_SIZE, MAG_DISPLAY_SIZE);
      colorLabel.textContent = '...';
      colorLabel.style.background = '#333';
      colorLabel.style.color = '#fff';
      colorLabel.style.transform = 'translate(' + (magX + totalW / 2 - 20) + 'px,' + (magY + totalW + 8) + 'px)';
      return;
    }

    // Map client coords to source canvas pixel coords
    const rect = sourceCanvas.getBoundingClientRect();
    const cx = Math.round((clientX - rect.left) / rect.width * sourceCanvas.width);
    const cy = Math.round((clientY - rect.top) / rect.height * sourceCanvas.height);

    // Extract pixel region (clamped)
    const startX = Math.max(0, Math.min(sourceCanvas.width - gridCount, cx - half));
    const startY = Math.max(0, Math.min(sourceCanvas.height - gridCount, cy - half));
    const imageData = sourceCtx.getImageData(startX, startY, gridCount, gridCount);

    currentColor = getPixelColor(cx, cy);

    // Clear and draw zoomed pixels
    magCtx.clearRect(0, 0, MAG_DISPLAY_SIZE, MAG_DISPLAY_SIZE);
    const pixels = imageData.data;
    for (let py = 0; py < gridCount; py++) {
      for (let px = 0; px < gridCount; px++) {
        const i = (py * gridCount + px) * 4;
        magCtx.fillStyle = 'rgb(' + pixels[i] + ',' + pixels[i+1] + ',' + pixels[i+2] + ')';
        magCtx.fillRect(Math.floor(px * cellSize), Math.floor(py * cellSize),
                        Math.ceil(cellSize), Math.ceil(cellSize));
      }
    }

    // Grid lines (only when cells are large enough to see)
    if (cellSize >= 4) {
      magCtx.strokeStyle = 'rgba(255,255,255,0.15)';
      magCtx.lineWidth = 0.5;
      for (let i = 0; i <= gridCount; i++) {
        const pos = Math.floor(i * cellSize);
        magCtx.beginPath();
        magCtx.moveTo(pos, 0);
        magCtx.lineTo(pos, MAG_DISPLAY_SIZE);
        magCtx.stroke();
        magCtx.beginPath();
        magCtx.moveTo(0, pos);
        magCtx.lineTo(MAG_DISPLAY_SIZE, pos);
        magCtx.stroke();
      }
    }

    // Center pixel highlight
    const cx0 = Math.floor(half * cellSize);
    const cy0 = Math.floor(half * cellSize);
    const cs = Math.ceil(cellSize);
    magCtx.strokeStyle = '#fff';
    magCtx.lineWidth = 2;
    magCtx.strokeRect(cx0, cy0, cs, cs);
    magCtx.strokeStyle = '#000';
    magCtx.lineWidth = 1;
    magCtx.strokeRect(cx0 - 1, cy0 - 1, cs + 2, cs + 2);

    // Color label
    colorLabel.textContent = currentColor.toUpperCase();
    colorLabel.style.background = currentColor;
    const r = parseInt(currentColor.slice(1,3), 16);
    const g = parseInt(currentColor.slice(3,5), 16);
    const b = parseInt(currentColor.slice(5,7), 16);
    const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    colorLabel.style.color = lum > 0.5 ? '#000' : '#fff';
    colorLabel.style.transform = 'translate(' + (magX + totalW / 2 - 35) + 'px,' + (magY + totalW + 8) + 'px)';
  }

  // Track mouse and draw immediately (even before screenshot loads)
  document.addEventListener('mousemove', (e) => {
    lastClientX = e.clientX;
    lastClientY = e.clientY;
    drawMagnifier(e.clientX, e.clientY);
  });

  // Scroll wheel — change magnification (fewer grid pixels = more zoom)
  document.addEventListener('wheel', (e) => {
    e.preventDefault();
    // Scroll up = zoom in (fewer pixels), scroll down = zoom out (more pixels)
    // Keep odd numbers for center pixel alignment
    const delta = e.deltaY < 0 ? -2 : 2;
    gridCount = Math.max(GRID_MIN, Math.min(GRID_MAX, gridCount + delta));
    if (gridCount % 2 === 0) gridCount += (delta > 0 ? 1 : -1); // keep odd
    drawMagnifier(lastClientX, lastClientY);
  }, { passive: false });

  document.addEventListener('click', (e) => {
    if (!imgLoaded) return;
    window.colorPickerAPI.sendColorPicked(currentColor);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      window.colorPickerAPI.sendColorPicked('');
    }
  });

  document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    window.colorPickerAPI.sendColorPicked('');
  });
</script>
</body>
</html>
