<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Icon Reference</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

        <!-- Icon font style (injected by renderPageIcons) -->
        <style type="text/css" media="screen" content="fontStyle" id="unicodeFontFace"></style>

        <!-- Icon data -->
        <script content="icons">
            var projectName = "";
            var groups = [];
            var icons = [];
        </script>

        <style>
            /* ═══════════════════════════════════════════════
               Bobcorn Demo — Brand tokens from docs/index.html
               Pixel-identical to the official website.
               ═══════════════════════════════════════════════ */
            :root {
                --bg: #FAFAF5;
                --text: #1A1917;
                --text-secondary: #52514B;
                --text-tertiary: #82817A;
                --accent: #3B82F6;
                --accent-hover: #2563EB;
                --accent-soft: rgba(59, 130, 246, 0.08);
                --divider: #E0DED2;
                --pill-bg: rgba(160, 158, 148, 0.12);
                --pill-hover: rgba(160, 158, 148, 0.24);
                --surface: #FFFFFF;
                --surface-muted: #F3F2EB;
                --code-bg: #2B2A27;
                --code-text: #E8E6DF;
                --icon-color: #52514B;
                --serif: Georgia, 'Times New Roman', serif;
                --sans: 'Outfit', system-ui, -apple-system, sans-serif;
                --mono: 'Space Mono', 'SF Mono', Consolas, monospace;
                --nav-h: 64px;
                --max-w: 1200px;
            }

            @media (prefers-color-scheme: dark) {
                :root:not([data-theme="light"]) {
                    --bg: #18181B;
                    --text: #E4E4E7;
                    --text-secondary: #A1A1AA;
                    --text-tertiary: #71717A;
                    --accent: #3B7BDB;
                    --accent-hover: #5A94E8;
                    --accent-soft: rgba(59, 123, 219, 0.12);
                    --divider: #27272A;
                    --pill-bg: rgba(161, 161, 170, 0.12);
                    --pill-hover: rgba(161, 161, 170, 0.22);
                    --surface: #1F1F23;
                    --surface-muted: #27272A;
                    --code-bg: #111113;
                    --code-text: #D4D4D8;
                    --icon-color: #A1A1AA;
                }
            }
            [data-theme="dark"] {
                --bg: #18181B;
                --text: #E4E4E7;
                --text-secondary: #A1A1AA;
                --text-tertiary: #71717A;
                --accent: #3B7BDB;
                --accent-hover: #5A94E8;
                --accent-soft: rgba(59, 123, 219, 0.12);
                --divider: #27272A;
                --pill-bg: rgba(161, 161, 170, 0.12);
                --pill-hover: rgba(161, 161, 170, 0.22);
                --surface: #1F1F23;
                --surface-muted: #27272A;
                --code-bg: #111113;
                --code-text: #D4D4D8;
                --icon-color: #A1A1AA;
            }

            /* ─── Reset ─── */
            *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

            html {
                scroll-behavior: smooth;
                scroll-padding-top: calc(var(--nav-h) + 56px);
            }

            body {
                font-family: var(--sans);
                background: var(--bg);
                color: var(--text);
                line-height: 1.6;
                overflow-x: hidden;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            a { color: inherit; }
            code, pre { font-family: var(--mono); }

            @media (prefers-reduced-motion: reduce) {
                html { scroll-behavior: auto; }
                *, *::before, *::after { transition-duration: 0s !important; animation-duration: 0s !important; }
                .reveal { opacity: 1 !important; transform: none !important; }
            }

            /* ─── Nav (matches docs/index.html nav exactly) ─── */
            .siteNav {
                position: fixed;
                top: 0; left: 0; right: 0;
                z-index: 100;
                padding: 0 48px;
                height: var(--nav-h);
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: rgba(250, 250, 245, 0.88);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
            }

            [data-theme="dark"] .siteNav { background: rgba(24, 24, 27, 0.88); }
            @media (prefers-color-scheme: dark) {
                :root:not([data-theme="light"]) .siteNav { background: rgba(24, 24, 27, 0.88); }
            }

            .navLogo {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                font-family: var(--serif);
                font-size: 22px;
                font-weight: 900;
                color: var(--text);
                text-decoration: none;
                letter-spacing: -0.01em;
            }

            .navLogo img { width: 28px; height: 28px; }

            .navRight {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            .navSearch {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 0 14px;
                height: 36px;
                background: var(--pill-bg);
                border: none;
                border-radius: 6px;
                transition: background 0.2s;
                min-width: 200px;
                max-width: 320px;
            }

            .navSearch:focus-within {
                background: var(--pill-hover);
                outline: 2px solid var(--accent-soft);
                outline-offset: 1px;
            }

            .navSearch svg {
                width: 14px; height: 14px;
                color: var(--text-tertiary);
                flex-shrink: 0;
            }

            .navSearch input {
                flex: 1; min-width: 0;
                border: none; outline: none;
                background: transparent;
                font-family: var(--sans);
                font-size: 13px;
                color: var(--text);
                letter-spacing: -0.005em;
            }

            .navSearch input::placeholder { color: var(--text-tertiary); }

            .navSearch .searchClear {
                display: none;
                align-items: center; justify-content: center;
                width: 16px; height: 16px;
                border: none;
                background: var(--text-tertiary);
                color: var(--bg);
                border-radius: 50%;
                cursor: pointer;
                font-size: 10px; line-height: 1;
            }
            .navSearch .searchClear.visible { display: flex; }

            .navSearch .countBadge {
                font-family: var(--mono);
                font-size: 11px;
                font-weight: 700;
                color: var(--text-tertiary);
                white-space: nowrap;
                letter-spacing: -0.02em;
            }

            .navSearch .kbdHint {
                padding: 1px 6px;
                border-radius: 4px;
                background: rgba(160, 158, 148, 0.15);
                font-family: var(--mono);
                font-size: 10px; font-weight: 700;
                color: var(--text-tertiary);
                pointer-events: none;
            }
            .navSearch:focus-within .kbdHint { display: none; }

            .navSep { color: var(--divider); font-size: 14px; user-select: none; }

            .navLink {
                font-family: var(--mono);
                font-size: 13px;
                color: var(--text-secondary);
                text-decoration: none;
                transition: color 0.2s;
            }
            .navLink:hover { color: var(--text); }

            .themeBtn {
                display: flex; align-items: center; justify-content: center;
                width: 32px; height: 32px;
                border: none;
                border-radius: 6px;
                background: none;
                cursor: pointer;
                color: var(--text-secondary);
                transition: color 0.2s, background 0.2s;
            }
            .themeBtn:hover { color: var(--text); background: var(--pill-bg); }
            .themeBtn svg { width: 16px; height: 16px; }
            .themeIcon--sun { display: none; }
            .themeIcon--moon { display: block; }
            [data-theme="dark"] .themeIcon--sun { display: block; }
            [data-theme="dark"] .themeIcon--moon { display: none; }
            @media (prefers-color-scheme: dark) {
                :root:not([data-theme="light"]) .themeIcon--sun { display: block; }
                :root:not([data-theme="light"]) .themeIcon--moon { display: none; }
            }

            /* ─── Tab bar (below nav) ─── */
            .tabBar {
                position: sticky;
                top: var(--nav-h);
                z-index: 99;
                background: var(--bg);
                border-bottom: 1px solid var(--divider);
                margin-top: var(--nav-h);
            }

            .tabBarInner {
                max-width: var(--max-w);
                margin: 0 auto;
                padding: 0 48px;
                display: flex;
                align-items: center;
                gap: 4px;
                height: 48px;
            }

            .tabBtn {
                position: relative;
                background: none; border: none; outline: none;
                cursor: pointer;
                padding: 6px 18px;
                font-family: var(--mono);
                font-size: 12px;
                font-weight: 700;
                letter-spacing: -0.02em;
                color: var(--text-secondary);
                border-radius: 6px;
                transition: color 0.15s, background 0.15s;
            }
            .tabBtn:hover { color: var(--text); background: var(--pill-bg); }
            .tabBtn.active { color: var(--accent); background: var(--accent-soft); }

            /* ─── Floating group sidebar ─── */
            .groupSidebar {
                position: fixed;
                right: 24px;
                top: 50%;
                transform: translateY(-50%);
                z-index: 90;
                max-height: calc(100vh - 160px);
                overflow-y: auto;
                overflow-x: hidden;
                padding: 12px 0;
                scrollbar-width: none;
            }
            .groupSidebar::-webkit-scrollbar { width: 0; }

            .groupSidebarItem {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 4px 12px 4px 0;
                text-decoration: none;
                cursor: pointer;
                transition: color 0.15s;
                white-space: nowrap;
            }

            .groupSidebarDot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                background: var(--divider);
                flex-shrink: 0;
                transition: background 0.15s, transform 0.15s;
            }

            .groupSidebarLabel {
                font-family: var(--sans);
                font-size: 12px;
                font-weight: 500;
                color: var(--text-tertiary);
                max-width: 160px;
                overflow: hidden;
                text-overflow: ellipsis;
                transition: color 0.15s;
                letter-spacing: -0.005em;
            }

            .groupSidebarItem:hover .groupSidebarLabel { color: var(--text); }
            .groupSidebarItem:hover .groupSidebarDot { background: var(--text-secondary); }

            .groupSidebarItem.active .groupSidebarDot {
                background: var(--accent);
                transform: scale(1.4);
            }
            .groupSidebarItem.active .groupSidebarLabel {
                color: var(--text);
                font-weight: 600;
            }

            /* ─── Main content area ─── */
            .mainContent {
                max-width: var(--max-w);
                margin: 0 auto;
                padding: 0 12px;
            }

            /* ─── Icon groups ─── */
            .iconSection { margin-bottom: 8px; }

            .iconSectionHeader {
                padding: 32px 0 14px;
                border-bottom: 1px solid var(--divider);
                margin-bottom: 20px;
                display: flex;
                align-items: baseline;
                gap: 12px;
            }

            .iconSectionTitle {
                font-family: var(--serif);
                font-size: clamp(22px, 3vw, 28px);
                font-weight: 900;
                letter-spacing: -0.02em;
                line-height: 1.15;
                color: var(--text);
            }

            .iconSectionCount {
                font-family: var(--mono);
                font-size: 12px;
                font-weight: 700;
                color: var(--text-tertiary);
                letter-spacing: -0.02em;
            }

            /* Icon grid — one per group, CSS auto-fill handles reflow on resize */
            .iconGrid {
                display: grid;
                grid-template-columns: repeat(auto-fill, 120px);
                column-gap: 4px;
            }

            /* Staggered fade-in (matches app's iconReveal exactly) */
            @keyframes iconReveal {
                from { opacity: 0; transform: scale(0.9) translateY(4px); }
                to { opacity: 1; transform: scale(1) translateY(0); }
            }

            /* ─── Icon blocks ─── */
            .iconBlock {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 18px 8px 14px;
                cursor: pointer;
                border-radius: 8px;
                text-align: center;
                overflow: hidden;
                opacity: 0;
            }
            .iconBlock.revealed {
                animation: iconReveal 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
                will-change: opacity, transform;
            }
            .iconBlock:hover { background: var(--pill-bg); }

            .iconOverlay {
                position: absolute; inset: 0;
                display: flex; flex-direction: column;
                align-items: center; justify-content: center;
                gap: 6px;
                background: rgba(26, 25, 23, 0.88);
                border-radius: 8px;
                opacity: 0;
                transition: opacity 0.15s;
                pointer-events: none;
            }
            .iconBlock:hover .iconOverlay { opacity: 1; pointer-events: auto; }

            .iconOverlay button {
                display: flex; align-items: center; gap: 5px;
                padding: 6px 14px;
                border: none; border-radius: 4px;
                font-family: var(--sans);
                font-size: 11px; font-weight: 500;
                cursor: pointer;
                background: rgba(255, 255, 255, 0.15);
                color: #fff;
                transition: background 0.15s;
                white-space: nowrap;
            }
            .iconOverlay button:hover { background: rgba(255, 255, 255, 0.30); }

            .iconContent {
                display: flex;
                align-items: center; justify-content: center;
                height: 48px;
            }
            .iconContent > * {
                font-size: 40px !important;
                color: var(--icon-color);
                transition: color 0.2s;
            }
            .iconBlock:hover .iconContent > * { color: var(--accent); }

            .iconName {
                margin-top: 10px;
                font-size: 12px; font-weight: 500;
                color: var(--text-secondary);
                width: 100%;
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
                letter-spacing: -0.005em;
            }
            .iconCode {
                margin-top: 3px;
                font-family: var(--mono);
                font-size: 11px;
                color: var(--text-tertiary);
                letter-spacing: -0.02em;
            }

            .noIconHint {
                font-size: 14px;
                color: var(--text-tertiary);
                text-align: center;
                padding: 48px 0;
            }

            /* ─── Divider (matches website .divider) ─── */
            .pageDivider {
                height: 1px;
                background: var(--divider);
                max-width: var(--max-w);
                margin: 0 auto;
            }

            /* ─── Usage section ─── */
            .usageWrap {
                max-width: var(--max-w);
                margin: 0 auto;
                padding: 80px 48px 0;
            }

            .usageLabel {
                font-family: var(--mono);
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--accent);
                margin-bottom: 20px;
            }

            .usageTitle {
                font-family: var(--serif);
                font-size: clamp(28px, 3.5vw, 40px);
                font-weight: 900;
                letter-spacing: -0.02em;
                line-height: 1.12;
                margin-bottom: 12px;
            }

            .usageDesc {
                font-size: 16px;
                color: var(--text-secondary);
                line-height: 1.75;
                letter-spacing: -0.005em;
                max-width: 560px;
                margin-bottom: 40px;
            }

            .usageTabs {
                display: flex;
                gap: 6px;
                margin-bottom: 28px;
            }

            .usageTabBtn {
                padding: 5px 14px;
                background: var(--pill-bg);
                border: none; border-radius: 6px;
                font-family: var(--mono);
                font-size: 12px; font-weight: 700;
                letter-spacing: -0.03em;
                color: var(--text);
                cursor: pointer;
                transition: color 0.2s, background 0.2s;
            }
            .usageTabBtn:hover { color: var(--accent); }
            .usageTabBtn.active { background: var(--accent); color: #FFFAF7; }

            .tabContent { display: none; }
            .tabContent.active { display: block; }

            .usageStep { margin-bottom: 28px; }

            .usageStep h3 {
                font-family: var(--mono);
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--text-tertiary);
                margin-bottom: 10px;
            }

            .usageStep p {
                font-size: 15px;
                color: var(--text-secondary);
                line-height: 1.7;
                letter-spacing: -0.005em;
                margin-bottom: 12px;
            }

            .usageStep pre {
                padding: 20px 24px;
                background: var(--code-bg);
                border-radius: 10px;
                overflow-x: auto;
                line-height: 1.65;
            }
            .usageStep pre code {
                font-size: 13px;
                color: var(--code-text);
            }

            .wikiLink {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                font-family: var(--mono);
                font-size: 12px;
                font-weight: 700;
                color: var(--accent);
                text-decoration: none;
                letter-spacing: -0.02em;
                margin-top: 4px;
                transition: color 0.2s;
            }
            .wikiLink:hover { color: var(--accent-hover); }
            .wikiLink svg { width: 12px; height: 12px; }

            /* ─── Footer (matches docs/index.html footer exactly) ─── */
            .siteFooter {
                max-width: var(--max-w);
                margin: 0 auto;
                padding: 36px 48px 48px;
                border-top: 1px solid var(--divider);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .footerBrand {
                font-family: var(--serif);
                font-size: 18px;
                font-weight: 900;
                color: var(--text);
                letter-spacing: -0.01em;
            }

            .footerLinks {
                display: flex;
                align-items: center;
                gap: 24px;
            }

            .footerLinks a {
                font-family: var(--mono);
                font-size: 12px;
                color: var(--text-secondary);
                text-decoration: none;
                transition: color 0.2s;
            }
            .footerLinks a:hover { color: var(--text); }

            /* ─── Back to Top ─── */
            .backToTop {
                position: fixed;
                bottom: 32px;
                right: 32px;
                z-index: 200;
                width: 40px; height: 40px;
                border-radius: 6px;
                border: none;
                background: var(--pill-bg);
                color: var(--text-secondary);
                cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                opacity: 0;
                pointer-events: none;
                transform: translateY(8px);
                transition: opacity 0.25s, transform 0.25s, color 0.15s, background 0.15s;
            }
            .backToTop.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
            .backToTop:hover { color: var(--accent); background: var(--pill-hover); }
            .backToTop svg { width: 18px; height: 18px; }

            /* ─── Toast ─── */
            .toast {
                position: fixed;
                bottom: 32px; left: 50%;
                transform: translateX(-50%) translateY(12px);
                background: var(--text);
                color: var(--bg);
                font-family: var(--mono);
                font-size: 12px; font-weight: 700;
                padding: 10px 24px;
                border-radius: 6px;
                letter-spacing: -0.02em;
                opacity: 0; pointer-events: none;
                transition: opacity 0.2s, transform 0.2s;
                z-index: 9999;
                white-space: nowrap;
            }
            .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

            /* ─── Reveal animations (matches website) ─── */
            .reveal {
                opacity: 0;
                transform: translateY(28px);
                transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                            transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            }
            .reveal.visible { opacity: 1; transform: translateY(0); }

            /* ─── Template (hidden) ─── */
            .template { display: none !important; }

            /* ─── Responsive ─── */
            @media (max-width: 900px) {
                .siteNav { padding: 0 24px; }
                .tabBarInner { padding: 0 24px; }
                .groupSidebar { right: 16px; }
                .groupSidebarLabel { max-width: 120px; }
                .mainContent { padding: 0 12px; }
                .usageWrap { padding: 64px 24px 0; }
                .siteFooter { padding: 28px 24px 36px; }
            }

            @media (max-width: 680px) {
                .siteNav { padding: 0 20px; height: 56px; }
                :root { --nav-h: 56px; }
                .navLogo { font-size: 18px; }
                .navSep { display: none; }
                .navLink { display: none; }
                .navSearch { min-width: 120px; }
                .tabBarInner { padding: 0 20px; height: 44px; }
                .tabBtn { padding: 5px 12px; font-size: 11px; }
                .groupSidebar { display: none; }
                .mainContent { padding: 0 8px; }
                .iconGrid { grid-template-columns: repeat(auto-fill, 96px); }
                .iconBlock { padding: 14px 4px 10px; }
                .iconContent > * { font-size: 32px !important; }
                .usageWrap { padding: 48px 20px 0; }
                .usageTitle { margin-bottom: 8px; }
                .siteFooter {
                    padding: 24px 20px 32px;
                    flex-direction: column; gap: 16px; text-align: center;
                }
            }

            @media (max-width: 480px) {
                .iconGrid { grid-template-columns: repeat(auto-fill, 80px); }
                .iconBlock { padding: 10px 2px 8px; }
                .iconContent > * { font-size: 28px !important; }
                .iconName { font-size: 11px; }
                .iconCode { font-size: 10px; }
            }
        </style>
    </head>
    <body>
    <!-- Preload symbol SVG sprite -->
    <script content="symbolPreload"></script>

        <!-- ─── Nav ─── -->
        <nav class="siteNav">
            <a class="navLogo" href="https://bobcorn.caldis.me" target="_blank" rel="noopener">
                <img src="APP_ICON_PLACEHOLDER" alt="Bobcorn" width="28" height="28">
                <span>Bobcorn</span>
                <span class="navSep" style="margin:0 4px">|</span>
                <span id="navProjectName" style="font-size:18px"></span>
            </a>
            <div class="navRight">
                <div class="navSearch">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchBar" oninput="onSearchInput()" onchange="updateSearchKeyword()">
                    <button class="searchClear" id="searchClear" onclick="clearSearch()">&times;</button>
                    <span class="countBadge" id="iconCountBadge"></span>
                    <span class="kbdHint" id="kbdHint">/</span>
                </div>
                <span class="navSep">|</span>
                <a class="navLink" id="navWikiLink" target="_blank" rel="noopener">Wiki</a>
                <span class="navSep">|</span>

        // ═══════════════════════════════════════════════
        // Per-icon reveal with row-grouped stagger animation
        //
        // Strategy: observe individual icons. When icons enter
        // viewport, batch them per animation frame, group by
        // visual row (offsetTop), and stagger by column index.
        // CSS Grid auto-fill handles reflow on resize — no
        // manual row chunking needed.
        // ═══════════════════════════════════════════════
        var _revealObserver = null;

        function processRevealQueue() {
            _revealRafId = null;
            if (!_revealQueue.length) return;

            // Group queued icons by their visual row (offsetTop)
            var rows = {};
            _revealQueue.forEach(function(el) {
                var top = el.offsetTop;
                if (!rows[top]) rows[top] = [];
                rows[top].push(el);
            });
            _revealQueue = [];

            var sortedTops = Object.keys(rows).map(Number).sort(function(a, b) { return a - b; });

            // Double-RAF: first frame paints the initial opacity:0 state,
            // second frame applies the animation so the browser has a
            // "before" frame to animate from.
            requestAnimationFrame(function() {
                sortedTops.forEach(function(top) {
                    var icons = rows[top];
                    icons.sort(function(a, b) { return a.offsetLeft - b.offsetLeft; });
                    for (var i = 0; i < icons.length; i++) {

                    hasNew = true;
                }
                if (hasNew && !_revealRafId) {
                    _revealRafId = requestAnimationFrame(processRevealQueue);
                }

                    var sc = document.createElement("script"); sc.src = "./" + projectName + ".js"; sc.content = "fontSymbolRefDOM"; document.querySelector("head").appendChild(sc); fs.innerHTML = symbolImportStyle; symbolDataAppended = true; break;
            }

            var allG = [], total = 0;
            groups.forEach(function(g) { var d = hash[g.id].iconData; if (d.length > 0) { allG.push({ groupData: hash[g.id].groupData, iconData: d }); total += d.length; } });

            // Build sidebar immediately (before batched rendering)
            buildGroupSidebar(allG);

            var container = document.querySelector(".iconGroupContainer");
            var batches = [], matched = 0;
            allG.forEach(function(g) {
                batches.push({ type: 'header', groupData: g.groupData, iconCount: g.iconData.length });
                for (var i = 0; i < g.iconData.length; i += BATCH_SIZE) {
                    var batch = g.iconData.slice(i, i + BATCH_SIZE);
                    batches.push({ type: 'icons', icons: batch });
                    batch.forEach(function(ic) { if (matchKeyword(ic)) matched++; });
                }
            });
            updateCount(matched);

            var curGroup = null, bi = 0;
            var revealObs = getRevealObserver();
            function next() {
                if (bi >= batches.length) {
                    // All batches rendered — group elements now exist, init scroll spy
                    initSidebarScrollSpy(allG);
                    return;
                }
                var b = batches[bi++];
                if (b.type === 'header') {
                    curGroup = document.querySelector(".template .iconSection").cloneNode(true);
                    curGroup.id = 'group-' + b.groupData.id;
                    curGroup.querySelector(".iconSectionTitle").innerHTML = b.groupData.groupName;
                    curGroup.querySelector(".iconSectionCount").textContent = b.iconCount !== undefined ? S('iconCount', { n: b.iconCount }) : '';
                    container.appendChild(curGroup);
                } else {
                    if (!curGroup) {
                        curGroup = document.querySelector(".template .iconSection").cloneNode(true);
                        curGroup.querySelector(".iconSectionHeader").style.display = "none";
                        container.appendChild(curGroup);
                    }
                    appendIconsToGrid(curGroup, b.icons, type, revealObs);
                }
                if (bi < batches.length) requestAnimationFrame(next);
            }
            next();
        }

        function updateCount(n) { document.getElementById("iconCountBadge").textContent = S('iconCount', { n: n !== undefined ? n : icons.length }); }

        // ═══════════════════════════════════════════════
        // Tab switching
        // ═══════════════════════════════════════════════
        function changeTab(evt, name) {
            document.querySelectorAll('.tabBtn').forEach(function(b) { b.classList.remove('active'); });
            evt.currentTarget.classList.add('active');
            currentTab = name;
            reRender();
        }
        function reRender() {
            if (_revealObserver) { _revealObserver.disconnect(); _revealObserver = null; }
            if (_sidebarObserver) { _sidebarObserver.disconnect(); _sidebarObserver = null; }
            _revealQueue = [];
            if (_revealRafId) { cancelAnimationFrame(_revealRafId); _revealRafId = null; }
            cleanPageIcons();
            renderPageIcons(currentTab);
        }

        // ═══════════════════════════════════════════════
        // Floating group sidebar + scroll spy
        // ═══════════════════════════════════════════════
        var _sidebarObserver = null;

        function buildGroupSidebar(allGroups) {
            var sidebar = document.getElementById('groupSidebar');
            sidebar.innerHTML = '';
            if (allGroups.length <= 1) { sidebar.style.display = 'none'; return; }
            sidebar.style.display = '';

            allGroups.forEach(function(g) {
                var a = document.createElement('a');
                a.className = 'groupSidebarItem';
                a.href = '#group-' + g.groupData.id;
                a.setAttribute('data-group', g.groupData.id);
                a.onclick = function(e) {
                    e.preventDefault();
                    var target = document.getElementById('group-' + g.groupData.id);
                    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                };
                var dot = document.createElement('span');
                dot.className = 'groupSidebarDot';
                var label = document.createElement('span');
                label.className = 'groupSidebarLabel';
                label.textContent = g.groupData.groupName;
                a.appendChild(dot);
                a.appendChild(label);
                sidebar.appendChild(a);
            });
        }

        // Observe group sections for scroll-spy highlight.
        // Must be called AFTER batched rendering completes so #group-xxx elements exist.
        function initSidebarScrollSpy(allGroups) {
            var sidebar = document.getElementById('groupSidebar');
            if (!sidebar || allGroups.length <= 1) return;

            if (_sidebarObserver) _sidebarObserver.disconnect();
            _sidebarObserver = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    var id = entry.target.id.replace('group-', '');
                    var link = sidebar.querySelector('[data-group="' + id + '"]');
                    if (link) {
                        if (entry.isIntersecting) link.classList.add('active');
                        else link.classList.remove('active');
                    }
                });
            }, { rootMargin: '-10% 0px -60% 0px' });

            allGroups.forEach(function(g) {
                var el = document.getElementById('group-' + g.groupData.id);
                if (el) _sidebarObserver.observe(el);
            });
        }

        // Usage tabs
        function switchUsageTab(evt, name) {
            document.querySelectorAll('.usageTabBtn').forEach(function(b) { b.classList.remove('active'); });
            evt.currentTarget.classList.add('active');
            document.querySelectorAll('#usageWrap .tabContent').forEach(function(c) { c.classList.remove('active'); });
            document.getElementById('usage-' + name).classList.add('active');
        }

        // ═══════════════════════════════════════════════
        // Search
        // ═══════════════════════════════════════════════
        function onSearchInput() {
            var v = document.getElementById("searchBar").value;
            document.getElementById("searchClear").classList.toggle("visible", v.length > 0);
            if (_searchTimer) clearTimeout(_searchTimer);
            _searchTimer = setTimeout(function() { searchKeyword = v; reRender(); }, 200);
        }
        function clearSearch() { var i = document.getElementById("searchBar"); i.value = ""; document.getElementById("searchClear").classList.remove("visible"); searchKeyword = ""; reRender(); i.focus(); }
        function updateSearchKeyword() { searchKeyword = document.getElementById("searchBar").value; reRender(); }

        document.addEventListener('keydown', function(e) {
            if (e.key === '/' && document.activeElement !== document.getElementById('searchBar')) { e.preventDefault(); document.getElementById('searchBar').focus(); }
            if (e.key === 'Escape' && document.activeElement === document.getElementById('searchBar')) { clearSearch(); document.getElementById('searchBar').blur(); }
        });

        function matchKeyword(icon) {
            if (!searchKeyword) return true;
            var kw = searchKeyword.toLowerCase();
            return icon.iconName.toLowerCase().indexOf(kw) !== -1 || ('&#x' + icon.iconCode.toLowerCase()).indexOf(kw) !== -1;
        }

        // ═══════════════════════════════════════════════
        // Download SVG
        // ═══════════════════════════════════════════════
        function downloadIconSvg(e) {
            e.stopPropagation();
            var block = this.closest(".iconBlock"), name = block.querySelector(".iconName").textContent;
            var iconEl = block.querySelector(".iconContent svg") || block.querySelector(".iconContent i");
            if (!iconEl) return;
            var code = block.getAttribute("iconCode").replace(/.*-/, "").replace(/[&#x;]/g, "");
            var sym = document.querySelector("#" + projectName + "-" + code), svg;
            if (sym) { svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + (sym.getAttribute("viewBox") || "0 0 1024 1024") + '">' + sym.innerHTML + '</svg>'; }
            else if (iconEl.tagName.toLowerCase() === "svg") { var cl = iconEl.cloneNode(true); var u = cl.querySelector("use"); if (u) { var h = u.getAttribute("xlink:href") || u.getAttribute("href"), r = document.querySelector(h); if (r) { cl.innerHTML = r.innerHTML; var vb = r.getAttribute("viewBox"); if (vb) cl.setAttribute("viewBox", vb); } } cl.setAttribute("xmlns", "http://www.w3.org/2000/svg"); cl.removeAttribute("class"); cl.removeAttribute("aria-hidden"); svg = new XMLSerializer().serializeToString(cl); }
            else { svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"><text x="50%" y="50%" dominant-baseline="central" text-anchor="middle" font-family="' + projectName + '" font-size="1024" fill="currentColor">&#x' + code + ';</text></svg>'; }
            var b = new Blob([svg], { type: "image/svg+xml" }), url = URL.createObjectURL(b), a = document.createElement("a"); a.href = url; a.download = name + ".svg"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            showToast(S('toastDownloaded', { name: name }));
        }

        // ═══════════════════════════════════════════════
        // Copy
        // ═══════════════════════════════════════════════
        function copyIconCode(e) {
            e.stopPropagation();
            var code = this.closest(".iconBlock").getAttribute("iconCode");
            if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(code).then(function() { showToast(S('toastCopied', { code: code })); }).catch(function() { fbCopy(code); }); }
            else { fbCopy(code); }
        }
        function fbCopy(t) { var i = document.createElement("input"); i.style.cssText = "position:fixed;left:-9999px;opacity:0"; document.body.appendChild(i); i.value = t; i.select(); document.execCommand("copy"); document.body.removeChild(i); showToast(S('toastCopied', { code: t })); }

        // ═══════════════════════════════════════════════
        // Scroll → back-to-top
        // ═══════════════════════════════════════════════
        var _sTick = false;
        window.addEventListener("scroll", function() {
            if (!_sTick) { _sTick = true; requestAnimationFrame(function() {
                document.getElementById("backToTop").classList.toggle("visible", window.scrollY > 300);
                _sTick = false;
            }); }
        });

        // ═══════════════════════════════════════════════
        // Init
        // ═══════════════════════════════════════════════
        // Use defaultTab if injected (preview mode defaults to Symbol for inline SVG)
        if (typeof defaultTab !== 'undefined') {
            currentTab = defaultTab;
            // Sync the tab button active state
            document.querySelectorAll('.tabBtn').forEach(function(b) {
                b.classList.remove('active');
                if (b.getAttribute('onclick') && b.getAttribute('onclick').indexOf(defaultTab) !== -1) b.classList.add('active');
            });
        }
        initUI();
        renderPageManual();
        renderPageIcons(currentTab);
    </script>
